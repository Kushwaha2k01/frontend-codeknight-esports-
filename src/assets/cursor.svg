  <!-- Main Pointer Arrow -->
  <path d="M10 10 L22 36 L25 25 L36 22 L10 10Z" fill="url(#cursorGrad)" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Floating Fluid Drops (similar to the reference image) -->
